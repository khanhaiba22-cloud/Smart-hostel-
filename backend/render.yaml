services:
  - type: web
    name: smart-hostel-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        value: https://smart-hostel-htlh.vercel.app
